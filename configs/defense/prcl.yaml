name: prcl
enabled: true
pcf:
  enabled: true
  stat: probe_alignment
  k_probes: 2
  probe_types: [blur, occlusion]
  normalize: rolling_zscore
  neighbor_k: 10
robust:
  mode: soft_weight
  lambda_pos: 0.5
  lambda_neg: 0.4
  w_min: 0.2
  trim_alpha: 0.0
  grad_cap_enabled: true
  grad_cap_value: 5.0
negatives:
  reweight: true
  false_negative_correction: false
quarantine:
  enabled: false
  threshold: 0.95
  reevaluate_every: 5
  percentile: 0.99
